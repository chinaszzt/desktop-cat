<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CatDeskPet</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div id="stage">
      <div id="bed" class="hidden" data-species="cat">
        <svg viewBox="0 0 130 70" width="130" height="70" overflow="visible">
          <ellipse cx="65" cy="62" rx="56" ry="6" fill="rgba(0,0,0,0.22)"/>
          <ellipse cx="65" cy="42" rx="60" ry="22" fill="var(--bed-dark)"/>
          <ellipse cx="65" cy="40" rx="46" ry="14" fill="var(--bed-light)"/>
          <ellipse cx="58" cy="36" rx="22" ry="5" fill="var(--bed-shine)" opacity="0.65"/>
          <!-- pig: straw whiskers across the rim -->
          <g class="bed-deco bed-deco-pig">
            <path d="M 18 36 L 8 30" stroke="#A87232" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M 18 40 L 6 38" stroke="#A87232" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M 112 36 L 122 30" stroke="#A87232" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M 112 40 L 124 38" stroke="#A87232" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M 65 24 L 60 16 M 65 24 L 70 16 M 65 24 L 65 14" stroke="#A87232" stroke-width="1.4" stroke-linecap="round"/>
          </g>
          <!-- bear: wood ring grain -->
          <g class="bed-deco bed-deco-bear">
            <ellipse cx="65" cy="40" rx="34" ry="9" stroke="#5E3B1A" stroke-width="0.8" fill="none" opacity="0.45"/>
            <ellipse cx="65" cy="40" rx="22" ry="5.5" stroke="#5E3B1A" stroke-width="0.8" fill="none" opacity="0.45"/>
          </g>
          <!-- species decoration emoji at the rim corner -->
          <text class="bed-deco-icon" x="98" y="36" font-size="18" text-anchor="middle"></text>
        </svg>
      </div>
      <div id="cat" data-species="cat" data-color="orange" data-facing="right" data-eyes="normal" data-mouth="normal">
        <div id="hat" class="hidden"></div>
        <div id="bubble" class="hidden"><span id="bubble-text">喵~</span></div>
        <div id="cat-body"></div>
        <div id="bed-body" class="hidden"></div>
      </div>
      <div id="toy" class="hidden">🧶</div>
      <div id="feed-emoji" class="hidden">🐟</div>
      <div id="flash" class="hidden"></div>
      <div id="bird" class="hidden">🐦</div>
      <svg id="laser-trail" preserveAspectRatio="none"></svg>
      <div id="particles"></div>
      <div id="ctx-menu" class="hidden">
        <div class="ctx-info">
          <div class="info-name">🐈 小猫</div>
          <div class="info-row">
            <span class="info-label">心情</span>
            <div class="info-bar"><div class="info-fill info-mood"></div></div>
            <span class="info-val info-mood-val">50</span>
          </div>
          <div class="info-row">
            <span class="info-label">困倦</span>
            <div class="info-bar"><div class="info-fill info-sleep"></div></div>
            <span class="info-val info-sleep-val">0</span>
          </div>
          <div class="info-status">溜达中~</div>
        </div>
        <div class="ctx-sep"></div>

        <div class="ctx-item has-sub">
          <span class="sub-label">🐾 动物</span>
          <span class="sub-arrow">▸</span>
          <div class="ctx-submenu">
            <div class="ctx-item" data-act="species" data-species="cat">🐈 猫</div>
            <div class="ctx-item" data-act="species" data-species="pig">🐷 猪</div>
            <div class="ctx-item" data-act="species" data-species="bear">🐻 熊</div>
          </div>
        </div>

        <div class="ctx-item has-sub">
          <span class="sub-label">🎨 毛色</span>
          <span class="sub-arrow">▸</span>
          <div class="ctx-submenu">
            <div class="ctx-item color-cat" data-color="orange">🟠 橘猫</div>
            <div class="ctx-item color-cat" data-color="calico">🐱 三花</div>
            <div class="ctx-item color-cat" data-color="cow">🐮 奶牛</div>
            <div class="ctx-item color-cat" data-color="tabby">🩶 灰虎斑</div>
            <div class="ctx-item color-cat" data-color="tuxedo">🎩 黑白</div>
            <div class="ctx-item color-pig"  data-color="pink">🌸 粉猪</div>
            <div class="ctx-item color-pig"  data-color="cream">🥛 奶白猪</div>
            <div class="ctx-item color-bear" data-color="brown">🟫 棕熊</div>
            <div class="ctx-item color-bear" data-color="black">⬛ 黑熊</div>
            <div class="ctx-item color-bear" data-color="polar">⬜ 北极熊</div>
          </div>
        </div>

        <div class="ctx-item has-sub">
          <span class="sub-label">🎮 互动</span>
          <span class="sub-arrow">▸</span>
          <div class="ctx-submenu">
            <div class="ctx-item" data-act="feed">🍴 投食</div>
            <div class="ctx-item" data-act="sleep">💤 让她睡一下</div>
            <div class="ctx-item" data-act="go-home">🏠 回窝睡觉</div>
            <div class="ctx-item" data-act="photo">📸 拍照模式</div>
          </div>
        </div>

        <div class="ctx-item has-sub">
          <span class="sub-label">🧸 玩具</span>
          <span class="sub-arrow">▸</span>
          <div class="ctx-submenu">
            <div class="ctx-item" data-act="toy" data-toy="yarn">🧶 毛线球</div>
            <div class="ctx-item" data-act="toy" data-toy="ball">⚽ 弹力球</div>
            <div class="ctx-item" data-act="toy" data-toy="paper">📄 纸团</div>
            <div class="ctx-item" data-act="toy" data-toy="mouse">🐭 假老鼠</div>
            <div class="ctx-item" data-act="toy" data-toy="laser">🔴 激光笔</div>
            <div class="ctx-item" data-act="toy" data-toy="wand">🪶 逗猫棒</div>
            <div class="ctx-item" data-act="toy-cancel">❌ 收起玩具</div>
          </div>
        </div>

        <div class="ctx-sep"></div>
        <div class="ctx-item ctx-danger" data-act="quit">退出</div>
      </div>
    </div>
  </body>
</html>
