name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cat-desk-pet-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      # the raw compiled binary — the frontend is embedded at compile time,
      # so this single .exe runs standalone with no install step (just needs
      # WebView2 on the machine, which ships with Windows 10/11 by default)
      - name: Upload portable single-file exe
        uses: actions/upload-artifact@v4
        with:
          name: cat-desk-pet-portable
          path: src-tauri/target/release/cat-desk-pet.exe
